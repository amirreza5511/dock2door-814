services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dock2door
      POSTGRES_USER: dock2door
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dock2door -d dock2door"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./expo
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./expo/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot

volumes:
  postgres_data:
  uploads_data:
